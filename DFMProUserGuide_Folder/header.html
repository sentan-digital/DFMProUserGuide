<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-size: 9pt; margin: 0; }
    .line { border-bottom: 1px solid #999; margin-bottom: 2mm; }
    table { width: 100%; border-collapse: collapse; }
    td { padding-bottom: 2mm; }
    .right { text-align: right; }
  </style>
</head>
<body>
  <table>
    <tr>
      <td><p>DFMPro インストールガイド</pp></td>
      <td class="right">
      <p>HCL Technologies / DFM Pro</p>  
      </td>
    </tr>
  </table>

  <script>
    (function () {
      var vars = {};
      var qs = document.location.search.substring(1).split('&');
      for (var i = 0; i < qs.length; i++) {
        var kv = qs[i].split('=', 2);
        vars[kv[0]] = decodeURIComponent(kv[1] || '');
      }
      var setText = function (cls, val) {
        var els = document.getElementsByClassName(cls);
        for (var j = 0; j < els.length; j++) els[j].textContent = val || '';
      };

      setText('page', vars.page);
      setText('topage', vars.topage);

      // 章タイトルっぽいものが欲しいなら、title を入れるのが無難（後述）
      setText('section', vars.title);
    })();
  </script>
  <div class="line"></div>
  <br>
</body>
</html>
